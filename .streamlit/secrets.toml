# Streamlit Secrets Configuration
# For local development only - NEVER commit with real keys
#
# How to use:
# 1. Create .streamlit/ folder in project root (if it doesn't exist)
# 2. Save this file as .streamlit/secrets.toml
# 3. Add your real API keys below (keep EMPTY for public deployment)
# 4. Streamlit will automatically load these on app startup
#
# For Streamlit Cloud:
# - Leave these empty (EMPTY = "")
# - Users provide keys via sidebar in the app
# - Keys are session-only (not saved to database)

# Optional: NewsAPI key for stock headlines
# Get free key at: https://newsapi.org
# Free tier: 100 requests/day
newsapi_key = ""

# Optional: OpenAI API key for AI financial analysis
# Get key at: https://platform.openai.com/api-keys
# Requires $5-20 credit in account for testing
openai_api_key = ""
